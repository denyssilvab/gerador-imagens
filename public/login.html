<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Gerador de Imagens</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(9,41,100,.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-bar {
      width: 6px;
      height: 36px;
      background: #89c13b;
      border-radius: 3px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #092964;
      line-height: 1.2;
    }

    .logo-text span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: #666;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #092964;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #092964;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d0d9ea;
      border-radius: 8px;
      font-size: 15px;
      color: #111;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 16px;
    }

    input:focus { border-color: #0251af; }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #0251af;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      margin-top: 4px;
    }

    button[type="submit"]:hover { background: #092964; }
    button[type="submit"]:disabled { opacity: .6; cursor: not-allowed; }

    .error {
      display: none;
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-bar"></div>
      <div class="logo-text">
        Gerador de Imagens
        <span>Acesso restrito</span>
      </div>
    </div>

    <h1>Entrar</h1>
    <p class="subtitle">Digite suas credenciais para continuar.</p>

    <div class="error" id="error-msg"></div>

    <form id="login-form" autocomplete="on">
      <label for="username">Usuário</label>
      <input id="username" type="text" name="username" autocomplete="username" required autofocus />

      <label for="password">Senha</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required />

      <button type="submit" id="btn">Entrar</button>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('error-msg');
      err.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();

        if (res.ok) {
          window.location.href = '/';
        } else {
          err.textContent = data.error || 'Erro ao fazer login.';
          err.classList.add('show');
        }
      } catch {
        err.textContent = 'Erro de conexão. Tente novamente.';
        err.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
